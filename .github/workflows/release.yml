name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install server dependencies
        run: npm install

      - name: Build React client
        run: |
          cd client
          npm install
          npm run build

      - name: Compile Linux x64 binary
        run: npm run build:binary

      - name: Rename binary for release
        run: |
          cp dist/nixpanel dist/nixpanel-linux-x64
          chmod +x dist/nixpanel-linux-x64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum nixpanel-linux-x64 > nixpanel-linux-x64.sha256
          cat nixpanel-linux-x64.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NixPanel v${{ steps.version.outputs.VERSION }}"
          body: |
            ## NixPanel v${{ steps.version.outputs.VERSION }}

            ### Installation

            ```bash
            bash <(curl -fsSL https://github.com/NixPanel/nixpanel/releases/latest/download/install.sh)
            ```

            ### Manual download

            | Platform | File |
            |----------|------|
            | Linux x64 | `nixpanel-linux-x64` |

            ### Verify checksum

            ```bash
            sha256sum -c nixpanel-linux-x64.sha256
            ```
          files: |
            dist/nixpanel-linux-x64
            dist/nixpanel-linux-x64.sha256
            .env.example
            install.sh
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
